name: Quality Gates

on:
  push:
    branches:
      - main
      - master
    paths:
      - trading/**
      - trends/**
      - paper_trading_ui/backend/**
      - paper_trading_ui/frontend/**
      - requirements.txt
      - requirements/**
      - .github/workflows/quality-gates.yml
  pull_request:
    paths:
      - trading/**
      - trends/**
      - paper_trading_ui/backend/**
      - paper_trading_ui/frontend/**
      - requirements.txt
      - requirements/**
      - .github/workflows/quality-gates.yml

jobs:
  python-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            requirements/research.txt
            requirements.txt
            paper_trading_ui/backend/requirements.txt

      - name: Install Python dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install ruff mypy

      - name: Run ruff lint gate
        run: ruff check trading trends paper_trading_ui/backend --select F,E9

      - name: Run mypy type gate
        run: mypy paper_trading_ui/backend trading --python-version 3.12 --ignore-missing-imports --follow-imports=skip

  frontend-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: paper_trading_ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: paper_trading_ui/frontend
        run: npm ci

      - name: Run frontend lint gate
        working-directory: paper_trading_ui/frontend
        run: npm run lint

      - name: Run frontend typecheck gate
        working-directory: paper_trading_ui/frontend
        run: npm run typecheck
