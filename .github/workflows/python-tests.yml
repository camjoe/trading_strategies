name: Python Tests

on:
  push:
    branches:
      - main
      - features
      - refactor
    paths:
      - trading/**
      - trends/**
      - tests/**
      - paper_trading_ui/backend/**
      - paper_trading_ui/__init__.py
      - requirements.txt
      - requirements/**
      - pytest.ini
      - .coveragerc
      - .github/workflows/python-tests.yml
  pull_request:
    paths:
      - trading/**
      - trends/**
      - tests/**
      - paper_trading_ui/backend/**
      - paper_trading_ui/__init__.py
      - requirements.txt
      - requirements/**
      - pytest.ini
      - .coveragerc
      - .github/workflows/python-tests.yml

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run tests with coverage
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
