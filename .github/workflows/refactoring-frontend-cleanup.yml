name: Refactoring Frontend Cleanup

on:
  pull_request:
    types:
      - closed
    branches:
      - Refactoring
    paths:
      - paper_trading_ui/frontend/**
      - .github/workflows/refactoring-frontend-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: paper_trading_ui/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: paper_trading_ui/frontend
        run: npm ci

      - name: Run frontend cleanup
        working-directory: paper_trading_ui/frontend
        run: npm run lint -- --fix

      - name: Detect frontend cleanup changes
        id: cleanup_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No frontend cleanup changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Frontend cleanup changes detected."
          fi

      - name: Export frontend cleanup patch
        if: steps.cleanup_changes.outputs.has_changes == 'true'
        run: git diff > cleanup-frontend.patch

      - name: Upload frontend cleanup patch
        if: steps.cleanup_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: refactoring-frontend-cleanup-patch
          path: cleanup-frontend.patch