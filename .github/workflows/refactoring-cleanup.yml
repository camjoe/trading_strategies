name: Refactoring Cleanup

on:
  pull_request:
    types:
      - closed
    branches:
      - Refactoring
    paths:
      - trading/**
      - trends/**
      - paper_trading_ui/backend/**
      - .github/workflows/refactoring-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements/base.txt
            requirements/dev.txt
            requirements/research.txt
            requirements.txt

      - name: Install dependencies and cleanup tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install ruff

      - name: Run cleanup
        run: |
          ruff check trading trends paper_trading_ui/backend --fix
          ruff format trading trends paper_trading_ui/backend

      - name: Detect cleanup changes
        id: cleanup_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No cleanup changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Cleanup changes detected."
          fi

      - name: Export cleanup patch
        if: steps.cleanup_changes.outputs.has_changes == 'true'
        run: git diff > cleanup-python.patch

      - name: Upload cleanup patch
        if: steps.cleanup_changes.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: refactoring-python-cleanup-patch
          path: cleanup-python.patch