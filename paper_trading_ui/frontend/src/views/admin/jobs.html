<div class="admin-section-page" data-admin-section-panel="jobs">
  <section class="card admin-card">
    <h2>Jobs &amp; Health</h2>
    <div class="admin-note-row">
      <p class="admin-note">Scheduled jobs, snapshots, refreshes, and backups.</p>
      <button
        id="adminOpsRefreshBtn"
        class="icon-button"
        type="button"
        aria-label="Refresh runtime status"
        data-tooltip="Refresh runtime status"
      >↻</button>
    </div>
    <div id="adminOpsMeta" class="admin-note">No operations snapshot loaded yet.</div>
    <div id="adminOpsOutput" class="admin-ops-output">
      <div class="empty">Load runtime status to inspect job health and recent artifacts.</div>
    </div>
  </section>
</div>
