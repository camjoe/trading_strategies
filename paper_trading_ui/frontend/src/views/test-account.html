<div id="tab-test-account" class="tab-panel layout" hidden>
  <section class="card detail-card">
    <h2>Test Account</h2>
    <div id="test-account-detail"><div class="empty">Loading…</div></div>
  </section>

  <section class="card admin-card">
    <h2>Add Trade</h2>
    <form id="test-account-trade-form" class="bt-row">
      <label class="bt-field">
        <span>Ticker</span>
        <input name="ticker" required placeholder="e.g. AAPL" />
      </label>
      <label class="bt-field">
        <span>Side</span>
        <select name="side" required>
          <option value="buy">Buy</option>
          <option value="sell">Sell</option>
        </select>
      </label>
      <label class="bt-field">
        <span>Qty</span>
        <input name="qty" type="number" min="0.0001" step="0.0001" required placeholder="1" />
      </label>
      <label class="bt-field">
        <span>Price</span>
        <input name="price" type="number" min="0.0001" step="0.01" required placeholder="100.00" />
      </label>
      <label class="bt-field">
        <span>Fee</span>
        <input name="fee" type="number" min="0" step="0.01" value="0" />
      </label>
      <button type="submit">Add Trade</button>
    </form>
    <div id="test-account-trade-result"></div>
  </section>
</div>
