<div id="tab-compare" class="tab-panel layout" hidden>
  <section class="card compare-card">
    <div class="compare-head section-heading">
      <div>
        <p class="section-kicker">Overview</p>
        <h2>Performance Overview</h2>
        <p class="section-copy">Compare strategy, benchmark, and return at a glance.</p>
      </div>
      <div class="section-actions">
        <button
          id="refreshCompareBtn"
          class="icon-button"
          type="button"
          aria-label="Refresh"
          data-tooltip="Refresh"
        >↻</button>
      </div>
    </div>
    <div class="compare-filters">
      <label for="compare-strategy-filter">Strategy</label>
      <select id="compare-strategy-filter">
        <option value="">All strategies</option>
      </select>
    </div>
    <div id="compareTable" class="empty">Loading account comparison...</div>
  </section>
</div>
