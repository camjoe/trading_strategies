<div id="tab-accounts" class="tab-panel layout">
  <section class="card account-workspace-card">
    <div class="account-workspace-head section-heading">
      <div>
        <p class="section-kicker">Accounts</p>
        <h2>Account Workspace</h2>
        <p id="accountWorkspaceMeta" class="muted">Select an account to focus the workspace.</p>
        <p class="section-copy account-workspace-help">Pick an account or browse the wider list.</p>
      </div>
      <div class="section-actions">
        <button id="snapshotAllBtn" class="icon-label-button" type="button" aria-label="Snapshot all accounts">
          <svg class="button-icon-svg" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6h1.9a1.5 1.5 0 0 0 1.06-.44l.5-.5A1.5 1.5 0 0 1 11.02 4.5h1.96a1.5 1.5 0 0 1 1.06.44l.5.5A1.5 1.5 0 0 0 15.6 6h1.9A2.5 2.5 0 0 1 20 8.5v7A2.5 2.5 0 0 1 17.5 18h-11A2.5 2.5 0 0 1 4 15.5z"/>
            <circle cx="12" cy="12" r="3.25"/>
          </svg>
          <span>All</span>
        </button>
      </div>
    </div>

    <div class="account-switcher">
      <label class="bt-field">
        <span>Current account</span>
        <select id="accountSelect">
          <option value="">Loading accounts...</option>
        </select>
      </label>
      <label class="bt-field account-search-field">
        <span>Search browser</span>
        <input id="accountSearchInput" type="search" placeholder="Search name, strategy, benchmark..." />
      </label>
      <button
        id="toggleAccountBrowserBtn"
        class="icon-label-button"
        type="button"
        aria-expanded="false"
        aria-controls="accountBrowserPanel"
        aria-label="Browse accounts"
      >
        <svg class="button-icon-svg" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="6"/>
          <path d="m16 16 4 4"/>
        </svg>
        <span>Browse</span>
      </button>
    </div>

    <div id="accountBrowserPanel" class="account-browser-panel" hidden>
      <div id="accountsGrid" class="accounts-grid account-browser-grid"></div>
    </div>

    <div id="accountDetail" class="empty">Choose an account to inspect positions, trades, snapshots, and analysis.</div>
  </section>
</div>
